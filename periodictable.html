<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>周期表タイムアタック（iPad横最適化 / 修正版）</title>

<style>
  :root{
    --bg:#0b1020;
    --text:#e8ecff;
    --muted:#aab4e6;

    --cell-bg: rgba(255,255,255,0.04);
    --cell-border: rgba(255,255,255,0.38);
    --cell-border-strong: rgba(255,255,255,0.62);

    --good-bg: rgba(57,217,138,0.28);
    --good-border: rgba(57,217,138,0.90);

    --bad-bg: rgba(255,92,124,0.22);
    --bad-border: rgba(255,92,124,0.90);

    --panelLine: rgba(255,255,255,.10);
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    background: radial-gradient(1200px 800px at 25% 15%, #1b2a6b 0%, transparent 55%),
                radial-gradient(900px 600px at 85% 20%, #5b1b5f 0%, transparent 55%),
                var(--bg);
    color: var(--text);
  }

  .wrap{
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 14px 18px;
  }

  h1{
    margin: 0 0 10px;
    font-size: 20px;
    letter-spacing: .02em;
  }

  .layout{
    display:grid;
    grid-template-columns: 390px 1fr;
    gap: 12px;
    align-items:start;
  }
  @media (max-width: 900px){
    .layout{grid-template-columns: 1fr;}
  }

  .panel{
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    border: 1px solid var(--panelLine);
    border-radius: 14px;
    padding: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
  }

  .top{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom: 10px;
  }

  .pill{
    background: rgba(0,0,0,.18);
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 999px;
    padding: 7px 10px;
    color: var(--muted);
    font-size: 13px;
    display:flex;
    gap:8px;
    align-items:center;
    white-space:nowrap;
  }
  .pill b{
    color:var(--text);
    font-weight:900;
    font-variant-numeric: tabular-nums;
  }

  .btns{display:flex; gap:8px; flex-wrap:wrap; margin-top: 4px;}
  button{
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.16);
    background: rgba(0,0,0,.20);
    color: var(--text);
    font-weight: 900;
    cursor:pointer;
    user-select:none;
    transition: transform .06s ease, background .2s ease, border-color .2s ease;
  }
  button:hover{background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.28);}
  button:active{transform: translateY(1px);}
  button.primary{
    background: rgba(57,217,138,.16);
    border-color: rgba(57,217,138,.45);
  }
  button.primary:hover{
    background: rgba(57,217,138,.22);
    border-color: rgba(57,217,138,.65);
  }
  button:disabled{opacity:.5; cursor:not-allowed;}

  .qtitle{
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 6px;
  }
  .question{
    font-size: 22px;
    font-weight: 950;
    line-height: 1.25;
    letter-spacing: .01em;
    margin: 0 0 10px;
    min-height: 56px;
  }

  .msg{
    border-radius: 14px;
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    min-height: 54px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .tag{
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: var(--muted);
    white-space:nowrap;
  }
  .tag.wait{color:#fff0c2; border-color: rgba(255,209,102,.55); background: rgba(255,209,102,.12);}
  .tag.good{color:#bff7dd; border-color: rgba(57,217,138,.55); background: rgba(57,217,138,.14);}
  .tag.bad{color:#ffd0da; border-color: rgba(255,92,124,.55); background: rgba(255,92,124,.12);}

  .note{
    margin-top: 10px;
    color: rgba(232,236,255,.72);
    font-size: 12px;
    line-height: 1.5;
  }

  /* 結果表示（終了後に必ず見える） */
  .result{
    margin-top: 10px;
    border-radius: 14px;
    padding: 12px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.18);
  }
  .result .big{
    font-size: 22px;
    font-weight: 950;
    letter-spacing:.02em;
    font-variant-numeric: tabular-nums;
  }
  .result .small{
    margin-top:6px;
    color: rgba(232,236,255,.75);
    font-size: 12px;
    line-height:1.45;
  }

  .ptable{
    display:grid;
    grid-template-columns: repeat(18, minmax(44px, 1fr));
    gap: 6px;
    align-items:stretch;
  }

  .cell{
    height: 56px;
    border-radius: 12px;
    background: var(--cell-bg);
    border: 2px solid var(--cell-border);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    user-select:none;
    transition: transform .06s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    position:relative;
    overflow:hidden;
  }
  .cell:hover{
    border-color: var(--cell-border-strong);
    background: rgba(255,255,255,0.07);
  }
  .cell:active{transform: translateY(1px);}

  .cell.gap{
    cursor:default;
    border: 2px dashed rgba(255,255,255,0.16);
    background: transparent;
    opacity: .35;
  }

  .sym{
    font-size: 18px;
    font-weight: 950;
    letter-spacing: .02em;
    opacity: 0;
    transform: translateY(2px);
    transition: opacity .18s ease, transform .18s ease;
    pointer-events:none;
  }
  .cell.open .sym{
    opacity: 1;
    transform: translateY(0);
  }

  .cell.flash-good{
    border-color: var(--good-border) !important;
    background: var(--good-bg) !important;
    box-shadow: 0 0 0 3px rgba(57,217,138,.12) inset, 0 0 18px rgba(57,217,138,.25);
  }
  .cell.flash-bad{
    border-color: var(--bad-border) !important;
    background: var(--bad-bg) !important;
    box-shadow: 0 0 0 3px rgba(255,92,124,.10) inset, 0 0 18px rgba(255,92,124,.22);
  }

  @media (min-width: 980px) and (max-width: 1200px){
    .cell{height: 58px;}
    .sym{font-size: 19px;}
  }
</style>
</head>

<body>
<div class="wrap">
  <h1>周期表タイムアタック（元素記号 / 原子番号1〜20）</h1>

  <div class="layout">
    <!-- 左：問題・操作 -->
    <section class="panel">
      <div class="top">
        <div class="pill">時間：<b id="time">00:00.0</b></div>
        <div class="pill">ミス：<b id="miss">0</b></div>
        <div class="pill">コンボ：<b id="combo">0</b></div>
        <div class="pill">進行：<b id="progress">0 / 0</b></div>
        <div class="pill">解放：<b id="opened">0</b></div>
      </div>

      <div class="btns">
        <button id="start" class="primary">スタート</button>
        <button id="reset">リセット</button>
      </div>

      <div style="height:10px"></div>

      <div class="qtitle">問題</div>
      <div class="question" id="question">スタートを押してください</div>

      <div class="msg">
        <div id="msgText">スタート待ち。</div>
        <div class="tag wait" id="tag">待機</div>
      </div>

      <div class="result" id="resultBox">
        <div class="big" id="resultBig">記録：—</div>
        <div class="small" id="resultSmall">
          ルール：ミス +5秒 / 3連続正解で -2秒。<br>
          原子番号の問題は 1〜20 のみ。
        </div>
      </div>

      <div class="note">
        ※マス内に原子番号は表示しません（ズレ防止）。<br>
        ※原子番号21以上は「元素記号」問題のみ出題。
      </div>
    </section>

    <!-- 右：周期表 -->
    <section class="panel">
      <div class="ptable" id="grid" aria-label="周期表"></div>
    </section>
  </div>
</div>

<script>
/* ===== 元素（高校化学頻出30） ===== */
const elements = [
  {Z:1,  s:"H",  p:1, g:1},
  {Z:2,  s:"He", p:1, g:18},

  {Z:3,  s:"Li", p:2, g:1},
  {Z:4,  s:"Be", p:2, g:2},
  {Z:5,  s:"B",  p:2, g:13},
  {Z:6,  s:"C",  p:2, g:14},
  {Z:7,  s:"N",  p:2, g:15},
  {Z:8,  s:"O",  p:2, g:16},
  {Z:9,  s:"F",  p:2, g:17},
  {Z:10, s:"Ne", p:2, g:18},

  {Z:11, s:"Na", p:3, g:1},
  {Z:12, s:"Mg", p:3, g:2},
  {Z:13, s:"Al", p:3, g:13},
  {Z:14, s:"Si", p:3, g:14},
  {Z:15, s:"P",  p:3, g:15},
  {Z:16, s:"S",  p:3, g:16},
  {Z:17, s:"Cl", p:3, g:17},
  {Z:18, s:"Ar", p:3, g:18},

  {Z:19, s:"K",  p:4, g:1},
  {Z:20, s:"Ca", p:4, g:2},

  {Z:26, s:"Fe", p:4, g:8},
  {Z:29, s:"Cu", p:4, g:11},
  {Z:30, s:"Zn", p:4, g:12},

  {Z:47, s:"Ag", p:5, g:11},
  {Z:50, s:"Sn", p:5, g:14},
  {Z:53, s:"I",  p:5, g:17},
  {Z:56, s:"Ba", p:6, g:2},

  {Z:79, s:"Au", p:6, g:11},
  {Z:80, s:"Hg", p:6, g:12},
  {Z:82, s:"Pb", p:6, g:14},
];

const Z_MAX_FOR_NUMBER_QUIZ = 20;

const pos = {};
elements.forEach(e => pos[`${e.p}-${e.g}`] = e);

/* ===== UI ===== */
const grid = document.getElementById("grid");
const timeEl = document.getElementById("time");
const missEl = document.getElementById("miss");
const comboEl = document.getElementById("combo");
const progressEl = document.getElementById("progress");
const openedEl = document.getElementById("opened");
const questionEl = document.getElementById("question");
const msgText = document.getElementById("msgText");
const tag = document.getElementById("tag");

const resultBig = document.getElementById("resultBig");
const resultSmall = document.getElementById("resultSmall");

const startBtn = document.getElementById("start");
const resetBtn = document.getElementById("reset");

/* ===== 状態 ===== */
let order = [];
let index = 0;
let opened = new Set();

let combo = 0;
let miss = 0;

let penalty = 0;
let bonus = 0;

let running = false;
let startTime = null;
let finalTime = null;

const PENALTY_PER_MISS = 5;
const COMBO_STEP = 3;
const BONUS_PER_STEP = 2;

/* ===== 描画 ===== */
function buildGrid(){
  grid.innerHTML = "";
  for(let p=1; p<=7; p++){
    for(let g=1; g<=18; g++){
      const key = `${p}-${g}`;
      const e = pos[key];

      const cell = document.createElement("div");
      if(!e){
        cell.className = "cell gap";
        grid.appendChild(cell);
        continue;
      }

      cell.className = "cell";
      cell.dataset.sym = e.s;

      const sym = document.createElement("div");
      sym.className = "sym";
      sym.textContent = e.s;
      cell.appendChild(sym);

      cell.addEventListener("click", () => onPick(cell, e));
      grid.appendChild(cell);
    }
  }
}

/* ===== ユーティリティ ===== */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function setStatus(kind, text){
  tag.className = "tag " + kind;
  tag.textContent = kind === "wait" ? "待機" : (kind === "good" ? "正解" : "不正解");
  msgText.textContent = text;
}

function flash(cell, good){
  const cls = good ? "flash-good" : "flash-bad";
  cell.classList.add(cls);
  setTimeout(()=>cell.classList.remove(cls), 220);
}

function updateHUD(){
  missEl.textContent = miss;
  comboEl.textContent = combo;
  openedEl.textContent = opened.size;
  progressEl.textContent = `${Math.min(index+1, order.length)} / ${order.length}`;
}

/* 終了後も計算できる。終了時は finalTime を使う */
function totalTimeNow(){
  if(startTime === null) return 0;
  const elapsed = (performance.now() - startTime) / 1000;
  return Math.max(0, elapsed + penalty - bonus);
}

function formatTime(sec){
  const m = Math.floor(sec/60);
  const s = sec - m*60;
  const mm = String(m).padStart(2,"0");
  const ss = String(Math.floor(s)).padStart(2,"0");
  const d = Math.floor((s - Math.floor(s))*10);
  return `${mm}:${ss}.${d}`;
}

/* ===== 出題（元素記号 or 原子番号1〜20のみ） ===== */
function nextQuestion(){
  if(index >= order.length){
    finalTime = totalTimeNow();        // ★終了瞬間を固定
    running = false;
    startBtn.disabled = false;

    // ★必ず画面内に記録を出す
    const ft = formatTime(finalTime);
    questionEl.textContent = `終了！ 記録 ${ft}`;
    timeEl.textContent = ft;

    setStatus("good", "終了しました。記録を確認してください。");
    resultBig.textContent = `記録：${ft}`;
    resultSmall.textContent =
      `ミス ${miss}回（+${penalty}s） / ボーナス -${bonus}s（3連続ごとに-2s）`;

    updateHUD();
    return;
  }

  const ans = order[index];

  // ★ここが重要：Z>20は絶対に元素記号問題
  const canNumber = (ans.Z <= Z_MAX_FOR_NUMBER_QUIZ);
  const askNumber = canNumber && (Math.random() < 0.5); // canNumber のときだけ 50%

  if(askNumber){
    questionEl.textContent = `原子番号「${ans.Z}」の場所をタップ`;
  }else{
    questionEl.textContent = `元素記号「${ans.s}」の場所をタップ`;
  }

  setStatus("wait", "答えの場所をタップしてください。");
  updateHUD();
}

/* ===== クリック判定 ===== */
function onPick(cell, e){
  if(!running) return;
  if(opened.has(e.s)) return;

  const ans = order[index];

  if(e.s === ans.s){
    flash(cell, true);

    cell.classList.add("open");
    opened.add(e.s);

    combo++;
    if(combo % COMBO_STEP === 0){
      bonus += BONUS_PER_STEP;
    }

    setStatus("good", `正解！ ${e.s} を解放`);
    index++;

    setTimeout(nextQuestion, 240);
  }else{
    flash(cell, false);

    combo = 0;
    miss++;
    penalty += PENALTY_PER_MISS;

    setStatus("bad", `不正解… +${PENALTY_PER_MISS}s（累積+${penalty}s） もう一度`);
    updateHUD();
  }
}

/* ===== タイマー更新 ===== */
function tick(){
  if(!running) return;
  timeEl.textContent = formatTime(totalTimeNow());
  requestAnimationFrame(tick);
}

/* ===== スタート / リセット ===== */
function startGame(){
  if(running) return;

  // リセット（開放状態も）
  opened.clear();
  document.querySelectorAll(".cell.open").forEach(c => c.classList.remove("open"));

  order = shuffle([...elements]);
  index = 0;

  combo = 0;
  miss = 0;
  penalty = 0;
  bonus = 0;

  running = true;
  startTime = performance.now();
  finalTime = null;

  startBtn.disabled = true;

  // 結果欄を初期化
  resultBig.textContent = "記録：—";
  resultSmall.textContent =
    "ルール：ミス +5秒 / 3連続正解で -2秒。原子番号の問題は 1〜20 のみ。";

  setStatus("wait", "開始！");
  updateHUD();
  nextQuestion();
  tick();
}

function resetGame(){
  running = false;
  startBtn.disabled = false;

  startTime = null;
  finalTime = null;

  opened.clear();
  document.querySelectorAll(".cell.open").forEach(c => c.classList.remove("open"));

  timeEl.textContent = "00:00.0";
  missEl.textContent = "0";
  comboEl.textContent = "0";
  openedEl.textContent = "0";
  progressEl.textContent = "0 / 0";

  questionEl.textContent = "スタートを押してください";
  setStatus("wait", "スタート待ち。");

  resultBig.textContent = "記録：—";
  resultSmall.textContent =
    "ルール：ミス +5秒 / 3連続正解で -2秒。原子番号の問題は 1〜20 のみ。";
}

startBtn.addEventListener("click", startGame);
resetBtn.addEventListener("click", resetGame);

/* init */
buildGrid();
resetGame();
</script>
</body>
</html>
