<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Doppler F-t Logger</title>

<style>
body{
font-family:sans-serif;
background:#f6f8fb;
margin:0;
}

.topbar{
background:white;
padding:12px;
border-bottom:1px solid #ddd;
}

.clock{
font-size:28px;
font-weight:bold;
}

.card{
background:white;
margin:12px;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
}

canvas{
width:100%;
height:260px;
border:1px solid #ccc;
}

button{
padding:10px 14px;
font-size:16px;
margin-right:6px;
}

</style>
</head>

<body>

<div class="topbar">
<div class="clock" id="clock"></div>
</div>

<div class="card">

開始秒
<select id="startSecond"></select>

測定時間
<input id="durationSec" type="number" value="5">

基準周波数
<input id="f0Input" value="1200">

<br><br>

<button id="micBtn">マイク開始</button>
<button id="armBtn">予約</button>
<button id="stopBtn">停止</button>
<button id="tsvBtn">TSV保存</button>

</div>

<div class="card">
<canvas id="chart" width="900" height="260"></canvas>
</div>

<script>

const SAMPLE_INTERVAL_MS = 50;

const clockEl=document.getElementById("clock");
const startSecondEl=document.getElementById("startSecond");

for(let i=0;i<60;i+=5){
let op=document.createElement("option");
op.value=i;
op.textContent=i;
startSecondEl.appendChild(op);
}

function updateClock(){
let now=new Date();
clockEl.textContent=now.toLocaleTimeString();
}

setInterval(updateClock,1000);

let audioContext;
let analyser;
let freqData;
let sampleRate;

let armed=false;
let measuring=false;

let startEpochMs=0;
let lastSampleMs=0;
let durationMs=0;

let logs=[];
let curve=[];

const canvas=document.getElementById("chart");
const g=canvas.getContext("2d");

async function startMic(){

let stream=await navigator.mediaDevices.getUserMedia({audio:true});

audioContext=new AudioContext();
await audioContext.resume();

let source=audioContext.createMediaStreamSource(stream);

analyser=audioContext.createAnalyser();
analyser.fftSize=8192;

source.connect(analyser);

freqData=new Float32Array(analyser.frequencyBinCount);
sampleRate=audioContext.sampleRate;

}

function peakFrequency(){

analyser.getFloatFrequencyData(freqData);

let hzPerBin=sampleRate/analyser.fftSize;

let max=-999;
let index=0;

for(let i=1;i<freqData.length;i++){
if(freqData[i]>max){
max=freqData[i];
index=i;
}
}

return index*hzPerBin;
}

function draw(){

g.clearRect(0,0,canvas.width,canvas.height);

if(curve.length<2) return;

let xmax=Math.max(...curve.map(p=>p.t));
let ymax=Math.max(...curve.map(p=>p.y));
let ymin=Math.min(...curve.map(p=>p.y));

let W=canvas.width;
let H=canvas.height;

curve.forEach((p,i)=>{

let x=p.t/xmax*W;
let y=H-(p.y-ymin)/(ymax-ymin)*H;

if(i==0){
g.beginPath();
g.moveTo(x,y);
}
else{
g.lineTo(x,y);
}

});

g.strokeStyle="#2563eb";
g.lineWidth=3;
g.stroke();

}

function loop(){

requestAnimationFrame(loop);

let now=new Date();

if(armed && !measuring){

if(now.getSeconds()==startSecondEl.value){

measuring=true;

startEpochMs=Date.now();
lastSampleMs=startEpochMs;

durationMs=document.getElementById("durationSec").value*1000;

logs=[];
curve=[];

}

}

if(measuring){

let nowMs=Date.now();

while(nowMs-lastSampleMs>=SAMPLE_INTERVAL_MS){

lastSampleMs+=SAMPLE_INTERVAL_MS;

let f=peakFrequency();
let f0=document.getElementById("f0Input").value;

let t=(lastSampleMs-startEpochMs)/1000;

logs.push({t,f,df:f-f0});

curve.push({t,y:f});

}

draw();

if(nowMs-startEpochMs>durationMs){
measuring=false;
}

}

}

loop();

micBtn.onclick=async()=>{

await startMic();

}

armBtn.onclick=()=>{

armed=true;

}

stopBtn.onclick=()=>{

measuring=false;

}

tsvBtn.onclick=()=>{

let tsv="t_s\tfreq_hz\tdf_hz\n";

logs.forEach(r=>{
tsv+=r.t.toFixed(2)+"\t"+r.f.toFixed(2)+"\t"+r.df.toFixed(2)+"\n";
});

let blob=new Blob([tsv]);
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="doppler_ft.tsv";
a.click();

}

</script>
</body>
</html>
