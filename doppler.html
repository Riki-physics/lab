<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doppler Mic</title>

<style>

body{
font-family:sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

canvas{
border:1px solid #ccc;
width:100%;
height:300px;
}

</style>
</head>

<body>

<h2>iPhone Doppler f-t</h2>

<button onclick="startMic()">マイク開始</button>
<button onclick="startMeasure()">測定開始</button>
<button onclick="sendArduino()">Arduinoへ送信</button>

<p id="status"></p>

<canvas id="chart"></canvas>

<script>

let audioContext
let analyser
let data

let sampleRate
let startTime

let logs=[]

async function startMic(){

const stream = await navigator.mediaDevices.getUserMedia({audio:true})

audioContext = new AudioContext()
analyser = audioContext.createAnalyser()

analyser.fftSize=8192

const source = audioContext.createMediaStreamSource(stream)
source.connect(analyser)

data = new Float32Array(analyser.frequencyBinCount)

sampleRate = audioContext.sampleRate

document.getElementById("status").innerText="mic ready"

}

function peakFrequency(){

analyser.getFloatFrequencyData(data)

let max=-999
let index=0

for(let i=1;i<data.length;i++){

if(data[i]>max){
max=data[i]
index=i
}

}

return index*(sampleRate/analyser.fftSize)

}

function startMeasure(){

logs=[]
startTime=performance.now()

loop()

}

function loop(){

let now=performance.now()

let t=(now-startTime)/1000

let f=peakFrequency()

logs.push({t,f})

draw()

if(t<10){

setTimeout(loop,50)

}

}

function draw(){

const canvas=document.getElementById("chart")
const g=canvas.getContext("2d")

g.clearRect(0,0,canvas.width,canvas.height)

if(logs.length<2) return

let xmax=Math.max(...logs.map(p=>p.t))
let ymax=Math.max(...logs.map(p=>p.f))

logs.forEach((p,i)=>{

let x=p.t/xmax*canvas.width
let y=canvas.height-(p.f/ymax)*canvas.height

if(i==0){
g.beginPath()
g.moveTo(x,y)
}else{
g.lineTo(x,y)
}

})

g.stroke()

}

async function sendArduino(){

let tsv="t_s\tfreq_hz\n"

logs.forEach(r=>{

tsv+=r.t.toFixed(2)+"\t"+r.f.toFixed(2)+"\n"

})

await fetch("/upload",{
method:"POST",
body:tsv
})

alert("送信しました")

}

</script>

</body>
</html>
