<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Mic + IMU Doppler Debug</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 14px; line-height: 1.35; }
    h1 { font-size: 18px; margin: 0 0 10px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; flex: 1 1 330px; }
    label { display:block; font-size: 12px; color:#444; margin-top: 8px; }
    input, select, button { font-size: 16px; padding: 8px; }
    input, select { width: 100%; box-sizing: border-box; }
    button { border-radius: 10px; border: 1px solid #ccc; background: #f7f7f7; }
    button.primary { background:#e9f2ff; border-color:#b8d3ff; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 8px 10px; margin-top: 8px; }
    .kv { background:#fafafa; border:1px solid #eee; border-radius:12px; padding:10px; }
    .k { font-size: 12px; color:#555; }
    .v { font-size: 18px; font-variant-numeric: tabular-nums; margin-top: 2px; }
    .small { font-size: 12px; color:#666; }
    .warn { color:#b00020; font-size: 12px; white-space: pre-wrap; }
    .ok { color:#0a7a0a; font-size: 12px; white-space: pre-wrap; }
    canvas { width: 100%; height: 180px; border:1px solid #eee; border-radius:12px; background:#fff; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body>
<h1>Mic + IMU（開始しない原因を画面に出す版）</h1>

<div class="card" style="margin-bottom:12px;">
  <button id="btnSession" class="primary">セッション開始（t=0 & v_imu=0）</button>
  <button id="btnStopAll">全部停止</button>
  <div class="small">
    ✅ 必ず <span class="mono">https://</span> で、できればSafariで開く。アプリ内ブラウザは避ける。<br>
    「開始しない」場合は、下の <b>エラー表示</b> を見て原因を潰す。
  </div>
  <div id="env" class="ok" style="margin-top:8px;"></div>
  <div id="err" class="warn" style="margin-top:8px;"></div>
</div>

<div class="row">
  <div class="card">
    <h2 style="font-size:16px;margin:0 0 6px;">① マイク（f2推定）</h2>
    <button id="btnMic" class="primary">マイク開始</button>
    <button id="btnMicStop">マイク停止</button>
    <div id="micStatus" class="small">未開始</div>

    <label>音源周波数 f1 [Hz]</label>
    <input id="f1" type="number" value="16000" min="1" step="1"/>

    <label>探索範囲 ±Δ [Hz]</label>
    <input id="spanHz" type="number" value="120" min="30" step="10"/>

    <label>探索ステップ [Hz]</label>
    <input id="stepHz" type="number" value="2" min="1" step="1"/>

    <label>f2 平滑化（0〜0.95）</label>
    <input id="smoothF2" type="number" value="0.70" min="0" max="0.95" step="0.05"/>

    <div class="grid">
      <div class="kv"><div class="k">f2 [Hz]</div><div class="v" id="f2Disp">—</div></div>
      <div class="kv"><div class="k">sampleRate [Hz]</div><div class="v" id="srDisp">—</div></div>
    </div>
  </div>

  <div class="card">
    <h2 style="font-size:16px;margin:0 0 6px;">② IMU（a→v）</h2>
    <button id="btnIMU" class="primary">IMU開始</button>
    <button id="btnIMUStop">IMU停止</button>
    <button id="btnZeroV">v_imuを0に</button>
    <div id="imuStatus" class="small">未開始</div>
    <div id="imuWarn" class="warn"></div>

    <label>軸</label>
    <select id="axis">
      <option value="x">x</option>
      <option value="y">y</option>
      <option value="z">z</option>
    </select>

    <label>τ_bias [s]</label>
    <input id="tauBias" type="number" value="2.5" min="0.2" max="10" step="0.1"/>

    <label>a 平滑化（0〜0.95）</label>
    <input id="smoothA" type="number" value="0.60" min="0" max="0.95" step="0.05"/>

    <label>v 平滑化 β（0〜0.98）</label>
    <input id="betaV" type="number" value="0.20" min="0" max="0.98" step="0.01"/>

    <div class="grid">
      <div class="kv"><div class="k">a_raw [m/s²]</div><div class="v" id="aRawDisp">—</div></div>
      <div class="kv"><div class="k">a [m/s²]</div><div class="v" id="aDisp">—</div></div>
      <div class="kv"><div class="k">v_imu [m/s]</div><div class="v" id="vImuDisp">—</div></div>
      <div class="kv"><div class="k">t [s]</div><div class="v" id="tDisp">—</div></div>
    </div>
  </div>
</div>

<div class="card" style="margin-top:12px;">
  <h2 style="font-size:16px;margin:0 0 6px;">③ グラフ</h2>
  <label>表示ウィンドウ [s]</label>
  <input id="winSec" type="number" value="10" min="3" max="60" step="1"/>

  <label>v表示レンジ（±）[m/s]</label>
  <input id="vRange" type="number" value="0.20" min="0.05" max="2" step="0.01"/>

  <div class="small" style="margin:8px 0 10px;">
    上：f2–t（青） 下：v_imu–t（橙） / a–t（緑）
  </div>
  <canvas id="cvF2" width="900" height="220"></canvas>
  <div style="height:10px"></div>
  <canvas id="cvVA" width="900" height="260"></canvas>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const errBox = $("err");
  const envBox = $("env");
  function logErr(msg) { errBox.textContent += msg + "\n"; }
  function clearErr() { errBox.textContent = ""; }
  window.addEventListener("error", (e) => logErr("JS Error: " + (e.message || e.type)));
  window.addEventListener("unhandledrejection", (e) => logErr("Promise Error: " + (e.reason?.message || e.reason)));

  const el = {
    btnSession: $("btnSession"),
    btnStopAll: $("btnStopAll"),

    btnMic: $("btnMic"),
    btnMicStop: $("btnMicStop"),
    micStatus: $("micStatus"),
    f1: $("f1"),
    spanHz: $("spanHz"),
    stepHz: $("stepHz"),
    smoothF2: $("smoothF2"),
    f2Disp: $("f2Disp"),
    srDisp: $("srDisp"),

    btnIMU: $("btnIMU"),
    btnIMUStop: $("btnIMUStop"),
    btnZeroV: $("btnZeroV"),
    imuStatus: $("imuStatus"),
    imuWarn: $("imuWarn"),
    axis: $("axis"),
    tauBias: $("tauBias"),
    smoothA: $("smoothA"),
    betaV: $("betaV"),
    aRawDisp: $("aRawDisp"),
    aDisp: $("aDisp"),
    vImuDisp: $("vImuDisp"),
    tDisp: $("tDisp"),

    winSec: $("winSec"),
    vRange: $("vRange"),
    cvF2: $("cvF2"),
    cvVA: $("cvVA"),
  };

  // ---- environment info
  envBox.textContent =
    `origin=${location.origin}\n` +
    `protocol=${location.protocol}\n` +
    `isSecureContext=${String(window.isSecureContext)}\n` +
    `userAgent=${navigator.userAgent}`;

  // ---- session time
  let sessionT0 = null;
  function ensureSession() {
    if (sessionT0 == null) startSession();
  }
  function tNowSec() {
    if (sessionT0 == null) return NaN;
    return (performance.now() - sessionT0) / 1000;
  }
  function startSession() {
    sessionT0 = performance.now();
    // reset states
    f2Smooth = NaN;
    aBias = 0;
    aSmooth = NaN;
    vInt = 0;
    vImuNow = 0;
    logN = 0;
    el.micStatus.textContent = "セッション開始済み（t=0）";
    el.imuStatus.textContent = "セッション開始済み（t=0）";
    clearErr();
  }

  // ---- logs (simple)
  const MAX = 8000;
  const tLog = new Array(MAX).fill(NaN);
  const f2Log = new Array(MAX).fill(NaN);
  const aLog  = new Array(MAX).fill(NaN);
  const vILog = new Array(MAX).fill(NaN);
  let logN = 0;
  function pushLog(t, f2, a, vI) {
    if (!isFinite(t)) return;
    if (logN >= MAX) return;
    tLog[logN] = t;
    f2Log[logN] = f2;
    aLog[logN] = a;
    vILog[logN] = vI;
    logN++;
  }

  // ---- mic (Goertzel)
  let audioCtx = null, micStream = null, analyser = null, micTimer = null;
  let f2Smooth = NaN;
  let sr = NaN;

  function goertzelPower(x, freq, sampleRate) {
    const w = 2 * Math.PI * freq / sampleRate;
    const cosw = Math.cos(w);
    const coeff = 2 * cosw;
    let s0 = 0, s1 = 0, s2 = 0;
    for (let n = 0; n < x.length; n++) {
      s0 = x[n] + coeff * s1 - s2;
      s2 = s1;
      s1 = s0;
    }
    return (s1*s1 + s2*s2 - coeff*s1*s2);
  }

  function estimateF2(buf, f1, span, step, sampleRate) {
    const fMin = Math.max(10, f1 - span);
    const fMax = f1 + span;
    // limit bins
    const maxBins = 140;
    const bins = Math.floor((fMax - fMin) / step) + 1;
    let stepUse = step;
    if (bins > maxBins) stepUse = Math.ceil((fMax - fMin) / maxBins);

    let bestF = NaN, bestP = -Infinity;
    for (let f = fMin; f <= fMax; f += stepUse) {
      const p = goertzelPower(buf, f, sampleRate);
      if (p > bestP) { bestP = p; bestF = f; }
    }
    return bestF;
  }

  async function startMic() {
    try {
      ensureSession();
      clearErr();

      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("navigator.mediaDevices.getUserMedia が使えません（Safari/HTTPS確認）");
      }

      el.micStatus.textContent = "許可待ち…";
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false }
      });

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      await audioCtx.resume(); // iOS対策
      sr = audioCtx.sampleRate;
      el.srDisp.textContent = String(sr);

      const src = audioCtx.createMediaStreamSource(micStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0;
      src.connect(analyser);

      const buf = new Float32Array(analyser.fftSize);
      el.micStatus.textContent = "マイク稼働中";

      micTimer = setInterval(() => {
        if (!analyser || !audioCtx) return;
        analyser.getFloatTimeDomainData(buf);

        const f1 = Number(el.f1.value);
        const span = Number(el.spanHz.value);
        const step = Number(el.stepHz.value);

        const f2 = estimateF2(buf, f1, span, step, sr);
        const alpha = Number(el.smoothF2.value);
        if (isFinite(f2)) {
          if (!isFinite(f2Smooth)) f2Smooth = f2;
          else f2Smooth = alpha * f2Smooth + (1 - alpha) * f2;
        }
        el.f2Disp.textContent = isFinite(f2Smooth) ? f2Smooth.toFixed(1) : "—";

        const t = tNowSec();
        pushLog(t, f2Smooth, aSmooth, vImuNow);
      }, 33);

    } catch (e) {
      logErr("Mic start failed: " + (e?.message ?? e));
      el.micStatus.textContent = "開始失敗";
    }
  }

  function stopMic() {
    if (micTimer) { clearInterval(micTimer); micTimer = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    analyser = null;
    el.micStatus.textContent = "停止";
  }

  // ---- IMU
  let imuRunning = false;
  let lastTimu = null;
  let imuAccumDt = 0;

  let aBias = 0;
  let aSmooth = NaN;
  let vInt = 0;
  let vImuNow = 0;

  async function requestIMUPermissionIfNeeded() {
    if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
      const res = await DeviceMotionEvent.requestPermission();
      if (res !== "granted") throw new Error("DeviceMotion permission not granted");
    }
  }
  function axisValue(acc, axis) {
    if (!acc) return NaN;
    if (axis === "x") return acc.x;
    if (axis === "y") return acc.y;
    return acc.z;
  }

  function onMotion(e) {
    ensureSession();
    const now = performance.now();
    if (lastTimu == null) lastTimu = now;
    const dt = (now - lastTimu) / 1000;
    lastTimu = now;

    imuAccumDt += dt;
    if (imuAccumDt < 0.02) return;
    const dtUse = imuAccumDt;
    imuAccumDt = 0;

    let acc = e.acceleration;
    let msg = "";
    if (!acc || acc.x == null) {
      acc = e.accelerationIncludingGravity;
      msg = "※acceleration=null → 重力込みを使用（軸固定前提）";
    }
    el.imuWarn.textContent = msg;

    const aRaw = axisValue(acc, el.axis.value);
    el.aRawDisp.textContent = isFinite(aRaw) ? aRaw.toFixed(3) : "—";

    if (!isFinite(aRaw) || !isFinite(dtUse) || dtUse <= 0 || dtUse > 0.2) return;

    const tau = Math.max(0.05, Number(el.tauBias.value));
    const k = Math.min(1, dtUse / tau);
    aBias = aBias + k * (aRaw - aBias);

    const aCorr = aRaw - aBias;

    const alphaA = Number(el.smoothA.value);
    if (!isFinite(aSmooth)) aSmooth = aCorr;
    else aSmooth = alphaA * aSmooth + (1 - alphaA) * aCorr;

    vInt += aSmooth * dtUse;
    const beta = Math.min(0.98, Math.max(0, Number(el.betaV.value)));
    vImuNow = beta * vImuNow + (1 - beta) * vInt;

    el.aDisp.textContent = isFinite(aSmooth) ? aSmooth.toFixed(3) : "—";
    el.vImuDisp.textContent = isFinite(vImuNow) ? vImuNow.toFixed(3) : "—";
    el.tDisp.textContent = isFinite(tNowSec()) ? tNowSec().toFixed(2) : "—";

    pushLog(tNowSec(), f2Smooth, aSmooth, vImuNow);
  }

  async function startIMU() {
    try {
      ensureSession();
      clearErr();
      el.imuStatus.textContent = "許可待ち…";
      await requestIMUPermissionIfNeeded();
      window.addEventListener("devicemotion", onMotion, { passive: true });
      imuRunning = true;
      lastTimu = null;
      imuAccumDt = 0;
      el.imuStatus.textContent = "IMU稼働中";
    } catch (e) {
      logErr("IMU start failed: " + (e?.message ?? e));
      el.imuStatus.textContent = "開始失敗";
    }
  }

  function stopIMU() {
    window.removeEventListener("devicemotion", onMotion);
    imuRunning = false;
    el.imuStatus.textContent = "停止";
  }

  function zeroV() {
    vInt = 0;
    vImuNow = 0;
    el.vImuDisp.textContent = "0.000";
  }

  // ---- drawing
  const ctxF2 = el.cvF2.getContext("2d");
  const ctxVA = el.cvVA.getContext("2d");

  function drawAxes(ctx, w, h, title, yLabel) {
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = "#111";
    ctx.font = "12px -apple-system, system-ui, sans-serif";
    ctx.fillText(title, 10, 16);
    ctx.strokeStyle = "#ddd";
    ctx.lineWidth = 1;
    ctx.strokeRect(8, 24, w-16, h-36);
    ctx.fillStyle = "#666";
    ctx.fillText(yLabel, 10, h-8);
  }
  function drawSeries(ctx, w, h, tArr, yArr, tMin, tMax, yMin, yMax, stroke) {
    const left = 8, top = 24, right = w-8, bottom = h-12;
    const width = right-left, height = bottom-top;
    const xOf = (t) => left + (t - tMin) / Math.max(1e-6, (tMax - tMin)) * width;
    const yOf = (y) => bottom - (y - yMin) / Math.max(1e-6, (yMax - yMin)) * height;
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 2;
    ctx.beginPath();
    let started = false;
    for (let i=0;i<tArr.length;i++){
      const t=tArr[i], y=yArr[i];
      if (!isFinite(t)||!isFinite(y)) { started=false; continue; }
      if (t<tMin||t>tMax) continue;
      const x=xOf(t), yy=yOf(y);
      if (!started) { ctx.moveTo(x,yy); started=true; }
      else ctx.lineTo(x,yy);
    }
    ctx.stroke();
  }

  function drawLoop() {
    const win = Math.max(3, Number(el.winSec.value));
    const tMax = isFinite(tNowSec()) ? tNowSec() : 0;
    const tMin = Math.max(0, tMax - win);

    // collect window
    const tArr=[], fArr=[], aArr=[], vArr=[];
    for (let i=0;i<logN;i++){
      const t=tLog[i];
      if (!isFinite(t) || t<tMin) continue;
      tArr.push(t);
      fArr.push(f2Log[i]);
      aArr.push(aLog[i]);
      vArr.push(vILog[i]);
    }

    // f2 scale around f1
    const f1 = Number(el.f1.value);
    const span = Number(el.spanHz.value);
    let fMin = (isFinite(f1)&&isFinite(span)) ? (f1-span) : 0;
    let fMax = (isFinite(f1)&&isFinite(span)) ? (f1+span) : 1;

    // a scale auto
    const aVals = aArr.filter(Number.isFinite);
    let aMin=-1, aMax=1;
    if (aVals.length) {
      aMin=Math.min(...aVals); aMax=Math.max(...aVals);
      const pad=Math.max(0.2,(aMax-aMin)*0.2);
      aMin-=pad; aMax+=pad;
    }

    // v scale fixed
    const vRange = Math.max(0.01, Number(el.vRange.value));
    const vMin=-vRange, vMax=vRange;

    drawAxes(ctxF2, el.cvF2.width, el.cvF2.height, "f2 – t", "f2 [Hz]");
    drawSeries(ctxF2, el.cvF2.width, el.cvF2.height, tArr, fArr, tMin, tMax, fMin, fMax, "#1f77b4");

    drawAxes(ctxVA, el.cvVA.width, el.cvVA.height, "v_imu / a – t", "v[m/s] & a[m/s^2]");
    drawSeries(ctxVA, el.cvVA.width, el.cvVA.height, tArr, vArr, tMin, tMax, vMin, vMax, "#ff7f0e");
    drawSeries(ctxVA, el.cvVA.width, el.cvVA.height, tArr, aArr, tMin, tMax, aMin, aMax, "#2ca02c");

    requestAnimationFrame(drawLoop);
  }

  // ---- wire buttons
  el.btnSession.addEventListener("click", startSession);
  el.btnStopAll.addEventListener("click", () => { stopMic(); stopIMU(); });
  el.btnMic.addEventListener("click", startMic);
  el.btnMicStop.addEventListener("click", stopMic);
  el.btnIMU.addEventListener("click", startIMU);
  el.btnIMUStop.addEventListener("click", stopIMU);
  el.btnZeroV.addEventListener("click", zeroV);

  // iOS crash avoidance
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) { stopMic(); stopIMU(); }
  });

  // start drawing
  requestAnimationFrame(drawLoop);
})();
</script>
</body>
</html>
