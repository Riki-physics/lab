<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Doppler F-t Logger</title>
  <style>
    :root{
      --bg:#f3f5f7;
      --panel:#ffffff;
      --text:#1f2937;
      --sub:#6b7280;
      --line:#d1d5db;
      --accent:#2563eb;
      --grid:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.95);
      border-bottom:1px solid var(--line);
      padding:14px 16px 12px;
      backdrop-filter:blur(8px);
    }
    .clock{
      font-size:2rem;
      font-weight:800;
      letter-spacing:.04em;
      line-height:1.1;
    }
    .next{
      margin-top:6px;
      font-size:.98rem;
      color:var(--sub);
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:16px;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:0 2px 10px rgba(0,0,0,.04);
    }
    .section-title{
      font-size:1.05rem;
      font-weight:800;
      margin-bottom:14px;
    }
    .controls{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px 16px;
    }
    .field label{
      display:block;
      font-size:.92rem;
      font-weight:700;
      margin-bottom:7px;
    }
    .field input{
      width:100%;
      padding:12px 14px;
      font-size:1rem;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
    }
    .button-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }
    button.action{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
      background:#eef2f7;
      color:var(--text);
    }
    button.action.primary{
      background:var(--accent);
      color:#fff;
    }
    button.action:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .status{
      margin-top:14px;
      font-size:.96rem;
      color:var(--sub);
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    .stat{
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      background:#fff;
    }
    .stat-title{
      font-size:.9rem;
      color:var(--sub);
      font-weight:700;
      margin-bottom:10px;
    }
    .stat-value{
      font-size:2.2rem;
      line-height:1.1;
      font-weight:800;
      word-break:break-word;
    }
    .chart-wrap{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:10px;
    }
    canvas{
      width:100%;
      height:320px;
      display:block;
      background:#fff;
      border-radius:12px;
    }
    .log{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fafafa;
      padding:12px;
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:.92rem;
      white-space:pre-wrap;
      overflow:auto;
      max-height:220px;
      line-height:1.45;
    }
    .hint{
      margin-top:10px;
      font-size:.9rem;
      color:var(--sub);
    }
    @media (max-width:720px){
      .controls,.stats{grid-template-columns:1fr}
      .clock{font-size:1.8rem}
      .stat-value{font-size:1.9rem}
      canvas{height:280px}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="clock" id="clock">--:--:--</div>
    <div class="next" id="nextInfo">開始時刻を設定してください</div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="section-title">計測設定</div>

      <div class="controls">
        <div class="field">
          <label for="startTimeInput">測定開始時刻</label>
          <input id="startTimeInput" type="time" step="1">
        </div>

        <div class="field">
          <label for="durationSec">測定時間 [s]</label>
          <input id="durationSec" type="number" min="1" max="60" step="1" value="5">
        </div>

        <div class="field">
          <label for="f0Input">基準周波数 f0 [Hz]</label>
          <input id="f0Input" type="number" min="100" max="5000" step="1" value="1200">
        </div>

        <div class="field">
          <label for="searchWidthInput">探索幅 ± [Hz]</label>
          <input id="searchWidthInput" type="number" min="20" max="1000" step="10" value="200">
        </div>
      </div>

      <div class="button-row">
        <button id="micBtn" class="action primary" type="button">マイク開始</button>
        <button id="armBtn" class="action" type="button" disabled>開始予約</button>
        <button id="stopBtn" class="action" type="button" disabled>停止</button>
        <button id="copyBtn" class="action" type="button" disabled>TSVをコピー</button>
      </div>

      <div class="status" id="status">状態: 未開始</div>
      <div class="hint">ページを開くと、開始時刻は自動で今から30秒後になります。出力は t_s, freq_hz, df_hz の3列TSVです。</div>
    </div>

    <div class="card">
      <div class="section-title">リアルタイム表示</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-title">推定周波数 f</div>
          <div class="stat-value" id="freqView">-- Hz</div>
        </div>
        <div class="stat">
          <div class="stat-title">周波数差 Δf = f - f0</div>
          <div class="stat-value" id="dfView">-- Hz</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">F-t グラフ</div>
      <div class="chart-wrap">
        <canvas id="chart" width="920" height="320"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="section-title">ログ先頭</div>
      <div class="log" id="logView">まだデータはありません。</div>
    </div>
  </div>

  <script>
    const SAMPLE_INTERVAL_MS = 50;

    const clockEl = document.getElementById("clock");
    const nextInfoEl = document.getElementById("nextInfo");
    const startTimeInput = document.getElementById("startTimeInput");
    const durationSecEl = document.getElementById("durationSec");
    const f0Input = document.getElementById("f0Input");
    const searchWidthInput = document.getElementById("searchWidthInput");
    const micBtn = document.getElementById("micBtn");
    const armBtn = document.getElementById("armBtn");
    const stopBtn = document.getElementById("stopBtn");
    const copyBtn = document.getElementById("copyBtn");
    const statusEl = document.getElementById("status");
    const freqView = document.getElementById("freqView");
    const dfView = document.getElementById("dfView");
    const logView = document.getElementById("logView");

    const canvas = document.getElementById("chart");
    const g = canvas.getContext("2d");

    let audioContext = null;
    let analyser = null;
    let freqData = null;
    let sampleRate = 48000;

    let armed = false;
    let measuring = false;
    let targetStartEpochMs = 0;
    let lastSampleMs = 0;
    let measureDurationMs = 5000;

    let logs = [];
    let curve = [];
    let freqHistory = [];

    function pad(n, len = 2) {
      return String(n).padStart(len, "0");
    }

    function formatClock1s(d) {
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function formatTimeInputValue(dateObj) {
      return `${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}:${pad(dateObj.getSeconds())}`;
    }

    function setDefaultStartTime() {
      const now = new Date();
      now.setSeconds(now.getSeconds() + 30);
      now.setMilliseconds(0);
      startTimeInput.value = formatTimeInputValue(now);
    }

    function parseStartTimeToday(hms) {
      const m = hms.match(/^(\d{2}):(\d{2})(?::(\d{2}))?$/);
      if (!m) return null;

      const hh = Number(m[1]);
      const mm = Number(m[2]);
      const ss = Number(m[3] || 0);

      if (hh > 23 || mm > 59 || ss > 59) return null;

      const now = new Date();
      const target = new Date(now);
      target.setHours(hh, mm, ss, 0);

      if (target.getTime() <= now.getTime()) {
        target.setDate(target.getDate() + 1);
      }
      return target;
    }

    function updateClock() {
      const now = new Date();
      clockEl.textContent = formatClock1s(now);

      const target = parseStartTimeToday(startTimeInput.value);
      if (!target) {
        nextInfoEl.textContent = "開始時刻の形式が不正です";
        return;
      }

      if (measuring) {
        nextInfoEl.textContent = "測定中";
        return;
      }

      const baseTarget = armed ? new Date(targetStartEpochMs) : target;
      const remainSec = Math.max(0, Math.ceil((baseTarget.getTime() - Date.now()) / 1000));
      nextInfoEl.textContent = `開始予定: ${formatClock1s(baseTarget)} まで ${remainSec} s`;
    }

    setInterval(updateClock, 1000);

    async function startMic() {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      await audioContext.resume();

      const source = audioContext.createMediaStreamSource(stream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 8192;
      analyser.smoothingTimeConstant = 0.08;

      source.connect(analyser);
      freqData = new Float32Array(analyser.frequencyBinCount);
      sampleRate = audioContext.sampleRate;

      statusEl.textContent = "状態: マイク準備完了";
      micBtn.disabled = true;
      armBtn.disabled = false;
    }

    function median3(a, b, c) {
      const arr = [a, b, c].sort((x, y) => x - y);
      return arr[1];
    }

    function detectFrequencyNearF0(f0, halfWidthHz) {
      analyser.getFloatFrequencyData(freqData);

      const hzPerBin = sampleRate / analyser.fftSize;
      const minF = Math.max(50, f0 - halfWidthHz);
      const maxF = f0 + halfWidthHz;

      const startBin = Math.max(1, Math.floor(minF / hzPerBin));
      const endBin = Math.min(freqData.length - 2, Math.ceil(maxF / hzPerBin));

      let maxDb = -Infinity;
      let maxIndex = startBin;

      for (let i = startBin; i <= endBin; i++) {
        if (freqData[i] > maxDb) {
          maxDb = freqData[i];
          maxIndex = i;
        }
      }

      const y1 = freqData[maxIndex - 1];
      const y2 = freqData[maxIndex];
      const y3 = freqData[maxIndex + 1];

      let delta = 0;
      const denom = y1 - 2 * y2 + y3;
      if (Math.abs(denom) > 1e-12) {
        delta = 0.5 * (y1 - y3) / denom;
      }

      const refinedBin = maxIndex + delta;
      const refinedFreq = refinedBin * hzPerBin;

      freqHistory.push(refinedFreq);
      if (freqHistory.length > 3) freqHistory.shift();

      if (freqHistory.length === 3) {
        return median3(freqHistory[0], freqHistory[1], freqHistory[2]);
      }
      return refinedFreq;
    }

    function drawChart(data, color = "#2563eb", yLabel = "Hz", title = "F-t") {
      g.clearRect(0, 0, canvas.width, canvas.height);

      const W = canvas.width;
      const H = canvas.height;
      const left = 66;
      const right = 18;
      const top = 20;
      const bottom = 48;
      const plotW = W - left - right;
      const plotH = H - top - bottom;

      g.fillStyle = "#ffffff";
      g.fillRect(0, 0, W, H);

      g.strokeStyle = "#e5e7eb";
      g.lineWidth = 1;
      for (let i = 0; i <= 5; i++) {
        const y = top + plotH * i / 5;
        g.beginPath();
        g.moveTo(left, y);
        g.lineTo(left + plotW, y);
        g.stroke();
      }
      for (let i = 0; i <= 5; i++) {
        const x = left + plotW * i / 5;
        g.beginPath();
        g.moveTo(x, top);
        g.lineTo(x, top + plotH);
        g.stroke();
      }

      g.strokeStyle = "#cbd5e1";
      g.strokeRect(left, top, plotW, plotH);

      g.fillStyle = "#6b7280";
      g.font = "14px sans-serif";
      g.fillText(title, left + 8, top + 18);
      g.fillText("t [s]", left + plotW - 28, H - 10);

      if (data.length < 2) return;

      const xs = data.map(p => p.t);
      const ys = data.map(p => p.y);

      let xmin = 0;
      let xmax = Math.max(...xs);
      let ymin = Math.min(...ys);
      let ymax = Math.max(...ys);

      if (xmax < 1) xmax = 1;

      if (Math.abs(ymax - ymin) < 1e-9) {
        ymax += 1;
        ymin -= 1;
      } else {
        const padY = 0.08 * (ymax - ymin);
        ymax += padY;
        ymin -= padY;
      }

      g.fillText(`${ymax.toFixed(1)} ${yLabel}`, 8, top + 14);
      g.fillText(`${ymin.toFixed(1)} ${yLabel}`, 8, top + plotH);

      g.strokeStyle = color;
      g.lineWidth = 3;
      g.beginPath();

      data.forEach((p, i) => {
        const x = left + plotW * (p.t - xmin) / (xmax - xmin);
        const y = top + plotH * (1 - (p.y - ymin) / (ymax - ymin));
        if (i === 0) g.moveTo(x, y);
        else g.lineTo(x, y);
      });

      g.stroke();
    }

    function buildTSV() {
      let tsv = "t_s\tfreq_hz\tdf_hz\n";
      tsv += logs.map(r =>
        `${r.t_s.toFixed(2)}\t${r.freq_hz.toFixed(3)}\t${r.df_hz.toFixed(3)}`
      ).join("\n");
      return tsv;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        ta.setSelectionRange(0, ta.value.length);
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      }
    }

    function reserveMeasurement() {
      if (!analyser) return;

      const target = parseStartTimeToday(startTimeInput.value);
      if (!target) {
        statusEl.textContent = "状態: 開始時刻の形式が不正です";
        return;
      }

      targetStartEpochMs = target.getTime();
      measureDurationMs = Number(durationSecEl.value) * 1000;
      armed = true;
      measuring = false;
      statusEl.textContent = `状態: ${formatClock1s(target)} に開始待ち`;
      updateClock();
    }

    function beginMeasurementNow() {
      measuring = true;
      armed = false;
      logs = [];
      curve = [];
      freqHistory = [];
      lastSampleMs = targetStartEpochMs;
      statusEl.textContent = "状態: 測定中";
      stopBtn.disabled = false;
      copyBtn.disabled = true;
      drawChart([], "#2563eb", "Hz", "F-t");
      updateClock();
    }

    function stopMeasurement() {
      measuring = false;
      armed = false;
      stopBtn.disabled = true;
      copyBtn.disabled = logs.length === 0;
      statusEl.textContent = `状態: 停止（${logs.length} 点）`;

      if (logs.length > 0) {
        logView.textContent = logs.slice(0, 25).map(r =>
          `${r.t_s.toFixed(2)}\t${r.freq_hz.toFixed(2)}\t${r.df_hz.toFixed(2)}`
        ).join("\n");
      }
      updateClock();
    }

    function loop() {
      requestAnimationFrame(loop);

      if (armed && !measuring && Date.now() >= targetStartEpochMs) {
        beginMeasurementNow();
      }

      if (measuring && analyser) {
        const nowMs = Date.now();
        const f0 = Number(f0Input.value);
        const halfWidthHz = Number(searchWidthInput.value);

        while (nowMs - lastSampleMs >= SAMPLE_INTERVAL_MS) {
          lastSampleMs += SAMPLE_INTERVAL_MS;

          const f = detectFrequencyNearF0(f0, halfWidthHz);
          const t = (lastSampleMs - targetStartEpochMs) / 1000;
          const df = f - f0;

          freqView.textContent = `${f.toFixed(2)} Hz`;
          dfView.textContent = `${df.toFixed(2)} Hz`;

          logs.push({
            t_s: t,
            freq_hz: f,
            df_hz: df
          });

          curve.push({ t, y: f });
          if (curve.length > 600) curve.shift();
        }

        drawChart(curve, "#2563eb", "Hz", "F-t");

        if (nowMs - targetStartEpochMs >= measureDurationMs) {
          stopMeasurement();
        }
      }
    }

    loop();

    micBtn.addEventListener("click", async () => {
      try {
        await startMic();
      } catch (e) {
        statusEl.textContent = "状態: マイク起動失敗";
        alert("マイクの起動に失敗しました。HTTPSで開いて、Safariのマイク許可を確認してください。");
        console.error(e);
      }
    });

    armBtn.addEventListener("click", reserveMeasurement);
    stopBtn.addEventListener("click", stopMeasurement);

    copyBtn.addEventListener("click", async () => {
      if (logs.length === 0) return;
      const ok = await copyText(buildTSV());
      statusEl.textContent = ok ? "状態: TSVをコピーしました" : "状態: コピーに失敗しました";
    });

    setDefaultStartTime();
    drawChart([], "#2563eb", "Hz", "F-t");
    updateClock();
  </script>
</body>
</html>
